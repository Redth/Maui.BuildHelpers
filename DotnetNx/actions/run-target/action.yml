name: DotnetNx run target
description: Run a single Nx project target through nxdn.

inputs:
  workspace:
    description: Workspace root.
    required: false
    default: '.'
  project:
    description: Nx project name to run. Required unless run-id is set.
    required: false
    default: ''
  target:
    description: Nx target to run, such as build, test, pack, or publish. Required unless run-id is set.
    required: false
    default: ''
  run-id:
    description: Full Nx run id, such as ProjectName:test. When set, project and target are ignored.
    required: false
    default: ''
  configuration:
    description: Optional Nx target configuration.
    required: false
    default: ''
  extra-args:
    description: Extra arguments appended to nx run.
    required: false
    default: ''
  env:
    description: Multiline KEY=VALUE entries exported before running nxdn.
    required: false
    default: ''
  script:
    description: Optional Bash setup script sourced before running nxdn. Exported variables remain available to the target.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Run project target
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        DOTNET_NX_PROJECT: ${{ inputs.project }}
        DOTNET_NX_TARGET: ${{ inputs.target }}
        DOTNET_NX_RUN_ID: ${{ inputs.run-id }}
        DOTNET_NX_CONFIGURATION: ${{ inputs.configuration }}
        DOTNET_NX_EXTRA_ARGS: ${{ inputs.extra-args }}
        DOTNET_NX_ENV: ${{ inputs.env }}
        DOTNET_NX_SCRIPT: ${{ inputs.script }}
      run: |
        set -euo pipefail
        if [[ -n "$DOTNET_NX_ENV" ]]; then
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
            if [[ "$line" != *=* ]]; then
              echo "::error::Invalid env entry '$line'. Use NAME=VALUE."
              exit 1
            fi
            name="${line%%=*}"
            value="${line#*=}"
            if [[ ! "$name" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
              echo "::error::Invalid env name '$name'."
              exit 1
            fi
            export "$name=$value"
          done <<< "$DOTNET_NX_ENV"
        fi
        if [[ -n "$DOTNET_NX_SCRIPT" ]]; then
          script_file="$(mktemp)"
          trap 'rm -f "$script_file"' EXIT
          printf '%s\n' "$DOTNET_NX_SCRIPT" > "$script_file"
          # shellcheck source=/dev/null
          source "$script_file"
        fi
        run_id="$DOTNET_NX_RUN_ID"
        if [[ -z "$run_id" ]]; then
          if [[ -z "$DOTNET_NX_PROJECT" || -z "$DOTNET_NX_TARGET" ]]; then
            echo "::error::Set either run-id or both project and target."
            exit 1
          fi
          run_id="$DOTNET_NX_PROJECT:$DOTNET_NX_TARGET"
        fi
        args=(run "$run_id")
        if [[ -n "$DOTNET_NX_CONFIGURATION" ]]; then
          args+=("--configuration=$DOTNET_NX_CONFIGURATION")
        fi
        if [[ -n "$DOTNET_NX_EXTRA_ARGS" ]]; then
          # shellcheck disable=SC2206
          extra=( $DOTNET_NX_EXTRA_ARGS )
          args+=("${extra[@]}")
        fi
        nxdn nx -- "${args[@]}"
