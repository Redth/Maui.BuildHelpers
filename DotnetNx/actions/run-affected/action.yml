name: DotnetNx run affected
description: Run an Nx affected target through nxdn with optional OS tag routing.

inputs:
  workspace:
    description: Workspace root.
    required: false
    default: '.'
  target:
    description: Nx target to run, such as restore, build, test, or pack.
    required: true
  base:
    description: Base commit SHA.
    required: true
  head:
    description: Head commit SHA.
    required: true
  os-tag:
    description: Optional DotnetNx OS tag filter, such as linux, macos, or windows.
    required: false
    default: ''
  exclude:
    description: Optional comma-separated project exclusion list.
    required: false
    default: ''
  extra-args:
    description: Extra arguments appended to nx affected.
    required: false
    default: ''
  env:
    description: Multiline KEY=VALUE entries exported before running nxdn.
    required: false
    default: ''
  script:
    description: Optional Bash setup script sourced before running nxdn. Exported variables remain available to the target.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Run affected target
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        DOTNET_NX_TARGET: ${{ inputs.target }}
        DOTNET_NX_BASE: ${{ inputs.base }}
        DOTNET_NX_HEAD: ${{ inputs.head }}
        DOTNET_NX_OS_TAG: ${{ inputs.os-tag }}
        DOTNET_NX_EXCLUDE: ${{ inputs.exclude }}
        DOTNET_NX_EXTRA_ARGS: ${{ inputs.extra-args }}
        DOTNET_NX_ENV: ${{ inputs.env }}
        DOTNET_NX_SCRIPT: ${{ inputs.script }}
      run: |
        set -euo pipefail
        if [[ -n "$DOTNET_NX_ENV" ]]; then
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
            if [[ "$line" != *=* ]]; then
              echo "::error::Invalid env entry '$line'. Use NAME=VALUE."
              exit 1
            fi
            name="${line%%=*}"
            value="${line#*=}"
            if [[ ! "$name" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
              echo "::error::Invalid env name '$name'."
              exit 1
            fi
            export "$name=$value"
          done <<< "$DOTNET_NX_ENV"
        fi
        if [[ -n "$DOTNET_NX_SCRIPT" ]]; then
          script_file="$(mktemp)"
          trap 'rm -f "$script_file"' EXIT
          printf '%s\n' "$DOTNET_NX_SCRIPT" > "$script_file"
          # shellcheck source=/dev/null
          source "$script_file"
        fi
        args=(
          -t "$DOTNET_NX_TARGET"
          "--base=$DOTNET_NX_BASE"
          "--head=$DOTNET_NX_HEAD"
        )
        if [[ -n "$DOTNET_NX_OS_TAG" ]]; then
          args+=("--projects=tag:os:$DOTNET_NX_OS_TAG")
        fi
        if [[ -n "$DOTNET_NX_EXCLUDE" ]]; then
          args+=("--exclude=$DOTNET_NX_EXCLUDE")
        fi
        if [[ -n "$DOTNET_NX_EXTRA_ARGS" ]]; then
          # shellcheck disable=SC2206
          extra=( $DOTNET_NX_EXTRA_ARGS )
          args+=("${extra[@]}")
        fi
        nxdn affected -- "${args[@]}"
